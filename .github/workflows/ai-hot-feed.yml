name: 7x24 资讯

on:
  schedule:
    # 每小时（GitHub 计划任务为尽力执行，可能略有延迟）
    - cron: '0 * * * *'
  workflow_dispatch:

# 避免与其它推送任务（每日精选）并发抢锁
concurrency:
  group: content-push
  cancel-in-progress: false

jobs:
  feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 抓取 7x24 资讯
        run: node scripts/ai-hot-feed.mjs

      - name: 提交 & 推送
        run: |
          git config user.name "CodeMiner-掘金安东尼"
          git config user.email "729922845@qq.com"

          git add web/public/ai-hot-feed.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git pull --rebase --autostash origin main || true
          git commit -m "chore: 7x24 资讯更新 $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push
